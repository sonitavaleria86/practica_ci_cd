name: SageMaker Processing Pipeline

on:
  workflow_run:
    workflows: ["Docker Build and Publish to ECR"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: practica-ci-cd
  S3_INPUT: s3://sonia-practicamlops/data/raw/
  S3_OUTPUT: s3://sonia-practicamlops/data/processed/
  SAGEMAKER_ROLE_ARN: arn:aws:iam::742563278972:role/service-role/AmazonSageMaker-ExecutionRole-20260220T215328

jobs:
  run-processing-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install boto3
        run: pip install boto3

      - name: Launch SageMaker Processing Job
        id: processing
        run: |
          python scripts/launch_processing_job.py \
            --image ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-latest \
            --role ${{ env.SAGEMAKER_ROLE_ARN }} \
            --input-s3 ${{ env.S3_INPUT }} \
            --output-s3 ${{ env.S3_OUTPUT }} \
            --instance-type ml.t3.medium

      - name: Create summary
        if: always()
        run: |
          echo "## SageMaker Processing Job 🔬" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Input S3  | \`${{ env.S3_INPUT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Output S3 | \`${{ env.S3_OUTPUT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance  | \`ml.t3.medium\` |" >> $GITHUB_STEP_SUMMARY
